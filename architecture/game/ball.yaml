apiVersion: pokeball.dev/core/v1alpha1
kind: BallManifest

metadata:
  id: Game
  name: LocalGame
  ballKind: FeatureBall
  protocolVersion: 1.0.0
  stateSchemaVersion: 1
  namespace: kinetickk.local
  status: accepted-design-implementation-locally-verified

spec:
  instance:
    stateKey: LocalPlayerId
    currentStateKey: local-player
    logicalBallInstanceId: kinetickk.local/Game/local-player
    lifecycleOwner: InlineAcceptedFrameRuntime
    singleWriter: true

  owns:
    - game.run-simulation
    - game.combat-and-rewards
    - game.permanent-progression
    - game.settings
    - game.semantic-presentation-state
    - game.latest-progress-persistence-status

  protocols:
    intents:
      - FrameElapsed
      - ViewportChanged
      - PointerMoved
      - PointerPressed
      - PointerReleased
      - BrakeChanged
      - DashRequested
      - PauseToggled
      - EscapeRequested
      - ScreenOpenRequested
      - MuteToggled
      - ChoiceSelected
      - ChoicesRerolled
      - EnterPressed
      - RunStartRequested
      - ReturnToMenuRequested
      - RebirthRequested
      - CoreShapeSelected
      - MetaUpgradePurchaseRequested
      - WeaponPurchaseOrEquipRequested
      - UserGestureObserved
    queries:
      - query: GetGameProjection
        result: GameProjection
        responseEnvelope: ReadResult
      - query: GetPersistenceStatus
        result: PersistenceStatus
        responseEnvelope: ReadResult
    projections:
      - payload: GameProjectionChanged
        envelope: ProjectionOutput
    effects:
      - payload: AdvanceAudio
        envelope: EffectRequest
      - payload: EnsureAudioUnlocked
        envelope: EffectRequest
      - payload: PersistProgress
        envelope: EffectRequest
    facts:
      - ProgressPersisted
      - ProgressPersistenceOutcomeUnknown

  canonicalProtocolShapes:
    decisionResult:
      - Accepted(Decision)
      - Rejected(BusinessRejection)
    semanticOutputFamily:
      - ProjectionOutput
      - EffectRequest
    semanticHandle:
      fields:
        - operationId
        - outputKind
        - localOrdinalOrName
      operationIdSource: reserved-explicit-GameDecisionContext
    sourceOrdinal:
      type: UInt32
      rule: unique-zero-based-contiguous-in-Decision.outputs
    reads:
      snapshot: CommittedStateSnapshot
      context: ReadContext
      result: ReadResult
      consistencyStampFields:
        - ballInstanceId
        - commitRevision
        - stateSchemaVersion
      createsCommitOrSemanticOutput: false

  protocolClosure:
    omittedOwnedCategoriesAreEmpty:
      - replies
      - signals
      - controlPulses
      - timers
    importedContracts: []
    dependencies: []
    preAcceptanceFailures:
      canonicalCategory: BoundaryResponse
      rawValidation: InteractionValidationResult.Invalid
      decision: GameDispatchResult.DecisionRejected
      admission: GameDispatchResult.AdmissionRejected

  authority:
    sovereign:
      - run-phase-and-reward-queues
      - simulation-and-combat-entities
      - permanent-progression-and-settings
      - fixed-step-accumulator-and-timers
      - deterministic-gameplay-rng
      - pending-progress-handle-and-latest-status
    capturedInput:
      - validated-bootstrap-progress
    projections:
      - GameProjection
      - PersistenceStatus
    interactionEphemeral:
      - focus-and-pointer-gesture-edge
      - text-measurer-and-render-interpolation-clock
      - visual-fx-rng
      - particles-motion-echoes-shockwaves-damage-numbers-decorative-arcs

  profiles:
    execution:
      selected: Inline
      mechanism: caller-confined-run-to-completion-with-reentrancy-guard
    state:
      selected: Transient
      mechanism: atomically-replaced-in-memory-AcceptedFrame
    isolation:
      selected: InProcess
      mechanism: explicit-construction-and-source-boundaries
    security:
      selected: Standard
      mechanism: double-quarantine-scoped-capabilities-and-safe-sinks
    composition:
      selected: Static
      mechanism: GameAssembly-direct-construction-without-service-registry

  limits:
    maxInputBytes: 4096
    maxStateBytes: 16777216
    maxCollectionItems: 2048
    maxOutputsPerDecision: 3
    maxEffectsPerDecision: 2
    maxCommandsPerDecision: 0
    maxCausalDepth: 2
    maxRetriesPerOperation: 0
    maxTransitionSteps: 48

  causalCompletion:
    synchronousProducer: PersistProgress
    fixedReservedSlots: 1
    rootIntentDepth: 1
    progressFactDepth: 2
    reservationPoint: before-source-Decision-acceptance
    unavailableResult: AdmissionFailure(CausalBudgetExceeded)
    retainedStatus: GameContinuationStatus.Retained
    resumePolicy: resume-before-new-root-and-after-source-commit
    blockedRootResult: AdmissionFailure(CausalBudgetExceeded)
    acceptedFactDropPolicy: prohibited-clear-only-after-Fact-commit

  visualProjectionDelivery:
    sourcePayload: GameProjectionChanged
    returnBridge: GameDispatchResult.Committed.visualFxCues
    interactionOwner: GameAssembly/InteractionFxReducer
    renderAttachment: VisualFxProjection
    maxCuesPerProjection: 2048
    retainedCueSlots: 2047
    dropMetadataSlot: 1
    dropMetadata: VisualCuesDropped
    synchronizationCuePolicy: displace-oldest-decorative-first-then-oldest-visual-defensive-fallback
    decorativeCuePolicy: deterministic-best-effort-drop-with-explicit-count
    canonicalGameReadContainsInteractionFx: false
    interactionAttachmentStampedByGameRead: false
    liveDelivery: drop-or-resync-permitted

  additionalCaps:
    sovereignCollectionPolicy: capacity-aware-domain-construction-plus-fail-closed-preflight
    fixedSimulationHz: 120
    maxDeliveryAttempts: 1
    maxAudioCuesProduced: 32
    maxAudioCuesExecutedPerAdvance: 3
    maxProgressPayloadBytes: 65536
    maxEnemies: 120
    maxProjectiles: 650
    maxPickups: 420
    maxTrailPoints: 110
    maxDelayedRelicHits: 256
    maxVisualFxCuesPerProjection: 2048
    maxParticles: 700
    maxMotionEchoes: 36
    maxShockwaves: 48
    maxDamageNumbers: 140
    maxDecorativeArcs: 128

  resourceExecution:
    ballMailboxCapacity: 0
    ballWorkerCount: 0
    desktopAudio:
      scope: private-resource-only
      workerCount: 1
      daemon: true
      queueType: ArrayBlockingQueue
      queueCapacity: 24
      backpressure: DiscardOldestPolicy
      lossPolicy: best-effort-drop-eligible-audio-only
    wasmAudio:
      scope: private-resource-only
      execution: direct-bounded-numeric-WebAudio-sink
      ballMailboxOrWorker: false

  capabilities:
    required:
      - game-audio-v1
      - game-progress-v1
    forbidden:
      - ArbitraryFile
      - ArbitraryKeyValueStore
      - ArbitraryNetwork
      - ArbitrarySql
      - ArbitraryUrl
      - Shell
    privateBindings:
      - id: game-audio-v1
        effects:
          - AdvanceAudio
          - EnsureAudioUnlocked
        target: GameAudioResource/PlatformTonePlayer
        protocolVersion: 1.0.0
        sink: bounded-numeric-tone-only
        attempts: 1
        retries: 0
        resultFacts: []
      - id: game-progress-v1
        effects:
          - PersistProgress
        target: ProgressStore
        protocolVersion: 1.0.0
        sink: fixed-namespace-and-key-only
        attempts: 1
        retries: 0
        resultFacts:
          - ProgressPersisted
          - ProgressPersistenceOutcomeUnknown

  claims:
    - id: KIN-PKB-C01
      boundary: one-local-Game-instance
      mechanism: one-Inline-writer-publishes-complete-AcceptedFrame-before-output-dispatch
      evidence:
        - InlineAcceptedFrameRuntimeTest
        - GameFeatureBallArchitectureTest
    - id: KIN-PKB-C02
      boundary: Game-decisions
      mechanism: explicit-state-pulse-context-and-cloneable-deterministic-gameplay-rng
      evidence:
        - GameFeatureBallArchitectureTest
        - CloneableXorWowRandomTest
        - BoundedVisualFxCueAccumulatorTest
        - nucleus-characterization-suites
    - id: KIN-PKB-C03
      boundary: Game-interaction-and-resource-paths
      mechanism: double-quarantine-with-exact-key-and-numeric-tone-capabilities
      evidence:
        - GameInteractionValidationTest
        - ProgressStoreTest
        - ProgressCodecTest
        - GameAssemblyTest
        - GameAudioTest
        - DesktopAudioExecutionPolicyTest

  nonClaims:
    - durable-state-or-output
    - zero-rpo-recovery
    - exactly-once-delivery
    - at-least-once-delivery
    - eventual-delivery
    - hostile-component-isolation
    - general-hardened-security
    - zero-allocation-or-zero-overhead
    - atomic-multi-source-render
    - durable-persistence-status
    - lossless-live-visual-projection-delivery

  artifacts:
    acceptedOverlay: docs/pokeball-project-overlay.md
    architecture: docs/ARCHITECTURE.md
    migration: docs/pokeball-migration.md
    conformance: docs/pokeball-conformance.md
    foundationScan: docs/pokeball-foundation-scan.md
    canonicalCore: spec/pokeball-architecture-core.md
    assembly: src/commonMain/kotlin/kinetickk/application/assembly/GameAssembly.kt
    protocol: src/commonMain/kotlin/kinetickk/features/game/nucleus/protocol/GameProtocol.kt
    readProtocol: src/commonMain/kotlin/kinetickk/features/game/nucleus/read/GameRead.kt
